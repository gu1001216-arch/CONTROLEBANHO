<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{% block title %}Controle Produtividade Pré-Banho e Banho{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
{% block extra_css %}{% endblock %}
</head>
<body>
{% if session.get('usuario') %}
<header class="topbar">
  <div class="topbar-brand">
    <img src="{{ url_for('static', filename='logo_decio.png') }}" alt="Décio" class="brand-logo">
    <div class="brand-text">
      <span class="brand-title">Controle de Produtividade</span>
      <span class="brand-sub">Pré-Banho e Banho</span>
    </div>
  </div>
  <div class="topbar-actions">
    <span class="user-chip"><span class="user-dot perfil-{{ session.get('perfil') }}"></span>{{ nome | default(session.get('nome')) }}</span>
    {% if session.get('perfil') == 'admin' %}
    <a href="{{ url_for('dashboard') }}" class="tb-btn" title="Dashboard"><i class="bi bi-grid-1x2-fill"></i></a>
    <a href="{{ url_for('admin_mestre') }}" class="tb-btn" title="Lista mestra"><i class="bi bi-table"></i></a>
    <a href="{{ url_for('admin_usuarios') }}" class="tb-btn" title="Usuários"><i class="bi bi-people-fill"></i></a>
    {% endif %}
    <a href="{{ url_for('logout') }}" class="tb-btn tb-btn-exit" title="Sair"><i class="bi bi-box-arrow-right"></i></a>
  </div>
</header>
{% endif %}
<main class="page {% if not session.get('usuario') %}page-bare{% endif %}">
  {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
